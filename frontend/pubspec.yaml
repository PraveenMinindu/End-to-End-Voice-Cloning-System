name: voiceclone_sinhala
description: AI Sinhala Singing Voice Cloning App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase — versions compatible with Flutter 3.27
  firebase_core: ^3.6.0
  firebase_storage: ^12.3.0
  cloud_firestore: ^5.4.0

  # File picking — web compatible
  file_picker: ^8.0.0

  # Audio — web compatible
  audioplayers: ^6.1.0

  # UI
  google_fonts: ^6.2.1
  provider: ^6.1.2

  # Network
  http: ^1.2.2

  # Web support
  web: ^1.0.0

  # Utils
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
